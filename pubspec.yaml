name: flight_ticket_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Icons untuk iOS style
  cupertino_icons: ^1.0.8
  
  # Google Fonts untuk font Poppins
  google_fonts: ^6.1.0
  
  # Cache gambar dari network
  cached_network_image: ^3.3.0
  
  # Format tanggal dan angka
  intl: ^0.19.0
  
  # Support SVG
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting untuk good coding practices
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Kalau nanti mau tambah gambar lokal, buka komentar ini:
  # assets:
  #   - images/
  #   - assets/icons/